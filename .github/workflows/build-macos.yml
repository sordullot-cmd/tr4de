name: Build macOS

# La compilation macOS ne peut pas se faire depuis Windows (Tauri ne cross-compile
# pas vers Mac). Ce workflow build le .app / .dmg sur un runner macOS GitHub.
on:
  workflow_dispatch: {} # lancement manuel depuis l'onglet Actions
  push:
    tags:
      - "v*" # ou automatiquement sur un tag de version (ex: v0.1.0)

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (Intel + Apple Silicon)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # frontendDist pointe vers l'URL Vercel hébergée : pas de build Next.js
      # nécessaire, Tauri se contente d'empaqueter le wrapper natif.
      - name: Build universal macOS app
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tao-trade-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error
